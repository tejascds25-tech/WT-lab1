<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        section {
            padding: 20px;
            margin: 20px;
            background: white;
            border-radius: 8px;
        }

        article {
            margin-bottom: 15px;
            padding: 10px;
            border-left: 4px solid #007BFF;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>Learning HTML Semantic Tags</p>
</header>

<section>
    <h2>Latest Articles</h2>

    <article>
        <h3>HTML Basics</h3>
        <p>HTML is the standard language used to create web pages.</p>
    </article>

    <article>
        <h3>Why Use Semantic Tags?</h3>
        <p>Semantic tags make web pages easier to read and improve SEO.</p>
    </article>

</section>

<footer>
    <p>© 2026 My Website | All Rights Reserved</p>
</footer>

</body>
</html>
